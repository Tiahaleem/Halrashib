<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cart.css">
</head>
<body>
     <!-- paste your navbar here -->
<nav class="header">
  <div class="header_flex">
    <!-- Logo -->
    <a class="logo" href="index.html">HRC WEARS</a>

    <!-- Links -->
    <div class="nav_link_flex" id="navLinks">
      <a class="nav_link active" href="index.html">Home</a>
      <a class="nav_link" href="shop.html">Shop</a>
      <!-- <a class="nav_link" href="categories.html">Categories</a> -->
      <!-- <a class="nav_link" href="contact.html">Contact</a> -->
    </div>

    <!-- Icons -->
    <div class="nav_icon">
      <button class="icon_btn" type="button" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
          <path fill="currentColor"
            d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5S14 7.01 14 9.5S11.99 14 9.5 14" />
        </svg>
      </button>

      <a class="icon_btn cart_btn" href="cart.html" aria-label="Cart">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 16 16">
          <path fill="currentColor"
            d="M4.5 1a.5.5 0 0 0-.447.277l-1 2A.5.5 0 0 0 3 3.5v10a.5.5 0 0 0 .5.5h9a.5.5 0 0 0 .5-.5v-10a.5.5 0 0 0-.053-.223l-1-2A.5.5 0 0 0 11.5 1zm.309 1h6.382l.5 1H4.31zM5.5 5a.5.5 0 0 1 .5.5V7a1.999 1.999 0 0 0 3 1.732c.62-.357 1-1.017 1-1.732V5.5a.5.5 0 0 1 .5-.5a.5.5 0 0 1 .5.5V7a3 3 0 0 1-4.5 2.598A3 3 0 0 1 5 7V5.5a.5.5 0 0 1 .5-.5" />
        </svg>
        <span class="cart_badge" id="cartCount">0</span>
      </a>

      <!-- Mobile menu button -->
      <button class="menu_btn" type="button" id="menuBtn" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

  <main class="cart_page">
    <div class="cart_inner">
      <h1 class="cart_title">My Cart</h1>

      <div class="cart_layout">
        <!-- items -->
        <div id="cartItems" class="cart_items"></div>

        <!-- summary -->
        <aside class="cart_summary">
          <p class="summary_title">Order Summary</p>

          <div class="summary_row">
            <span>Subtotal</span>
            <strong id="cartSubtotal">₦0</strong>
          </div>

          <a class="checkout_btn" href="checkout.html">Checkout</a>
          <a class="continue_link" href="shop.html">Continue shopping</a>
        </aside>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script src="cart-page.js"></script>
</body>
</html>
