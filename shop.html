<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="shop.css">
</head>
<body>
   <nav class="header">
  <div class="header_flex">
    <!-- Logo -->
    <a class="logo" href="index.html">HRC WEARS</a>

    <!-- Links -->
    <div class="nav_link_flex" id="navLinks">
      <a class="nav_link active" href="index.html">Home</a>
      <a class="nav_link" href="shop.html">Shop</a>
      <!-- <a class="nav_link" href="categories.html">Categories</a> -->
      <!-- <a class="nav_link" href="contact.html">Contact</a> -->
    </div>

    <!-- Icons -->
    <div class="nav_icon">
      <button class="icon_btn" type="button" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
          <path fill="currentColor"
            d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5A6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5S14 7.01 14 9.5S11.99 14 9.5 14" />
        </svg>
      </button>

      <a class="icon_btn cart_btn" href="cart.html" aria-label="Cart">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 16 16">
          <path fill="currentColor"
            d="M4.5 1a.5.5 0 0 0-.447.277l-1 2A.5.5 0 0 0 3 3.5v10a.5.5 0 0 0 .5.5h9a.5.5 0 0 0 .5-.5v-10a.5.5 0 0 0-.053-.223l-1-2A.5.5 0 0 0 11.5 1zm.309 1h6.382l.5 1H4.31zM5.5 5a.5.5 0 0 1 .5.5V7a1.999 1.999 0 0 0 3 1.732c.62-.357 1-1.017 1-1.732V5.5a.5.5 0 0 1 .5-.5a.5.5 0 0 1 .5.5V7a3 3 0 0 1-4.5 2.598A3 3 0 0 1 5 7V5.5a.5.5 0 0 1 .5-.5" />
        </svg>
        <span class="cart_badge" id="cartCount">0</span>
      </a>

      <!-- Mobile menu button -->
      <button class="menu_btn" type="button" id="menuBtn" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav> 

  <main class="shop_page">
    <div class="shop_inner">

      <header class="shop_top">
        <div>
          <h1 class="shop_title">All Products</h1>
          <p class="shop_count"><span id="productCount">0</span> products</p>
        </div>

        <div class="shop_search">
          <span class="search_icon">⌕</span>
          <input id="searchInput" type="text" placeholder="Search products..." />
        </div>
      </header>

      <div class="shop_layout">
        <!-- Sidebar -->
        <aside class="shop_filters">
          <div class="filter_block">
            <p class="filter_title">CATEGORY</p>
            <button class="filter_link active" data-category="all" type="button">All</button>
            <button class="filter_link" data-category="dresses" type="button">Dresses</button>
            <button class="filter_link" data-category="tops" type="button">Tops</button>
            <button class="filter_link" data-category="three-piece" type="button">Three Piece</button>
            <button class="filter_link" data-category="accessories" type="button">Accessories</button>
          </div>

          <div class="filter_block">
            <p class="filter_title">PRICE</p>
            <button class="filter_link active" data-price="all" type="button">All Prices</button>
            <button class="filter_link" data-price="under-20000" type="button">Under ₦20,000</button>
            <button class="filter_link" data-price="20000-35000" type="button">₦20,000 – ₦35,000</button>
            <button class="filter_link" data-price="35000-50000" type="button">₦35,000 – ₦50,000</button>
            <button class="filter_link" data-price="above-50000" type="button">Above ₦50,000</button>
          </div>
        </aside>

        <!-- Products -->
        <section>
          <div id="shopGrid" class="shop_grid"></div>
        </section>
      </div>

    </div>
  </main>
<script src="products.js"></script>
<script src="app.js"></script>
<script src="shop.js"></script>
</body>
</html>
